# fly.toml app configuration file
#
# See https://fly.io/docs/reference/configuration/ for information

app = "" # You must set your app name here
primary_region = "hkg"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[env]
  NODE_ENV = "production"
  PORT = "3000"
  TZ = "Asia/Manila"
